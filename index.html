<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORTUNE EARNERS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        // Custom Tailwind configurations for your branding colors
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brandBlue: '#0A192F',       // Deep base blue background
                        brandBlueCard: '#112240',   // Structured inner panels
                        brandYellow: '#FACC15',     // Primary accent yellow
                        brandPink: '#EC4899',       // Secondary accent pink
                    }
                }
            }
        }
    </script>
    <style>
        .view-section { display: none; }
        .view-section.active { display: block; }
    </style>
</head>
<body class="bg-brandBlue text-gray-100 font-sans antialiased pb-24">

    <div id="loading-screen" class="fixed inset-0 z-[100] bg-brandBlue flex flex-col items-center justify-center">
        <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-brandYellow mb-4"></div>
        <p class="text-sm font-semibold tracking-wider text-gray-400">LOADING FORTUNE EARNERS...</p>
    </div>

    <div id="auth-container" class="hidden min-h-screen flex items-center justify-center px-4 py-12">
        
        <div id="auth-signin" class="view-section active w-full max-w-md bg-brandBlueCard border border-gray-800 rounded-3xl p-6 space-y-6 shadow-xl">
            <div class="text-center">
                <h2 class="text-2xl font-black tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-brandYellow to-brandPink">FORTUNE EARNERS</h2>
                <p class="text-xs text-gray-400 mt-1">Sign in to manage your daily workspace</p>
            </div>
            <form id="signin-form" class="space-y-4">
                <div>
                    <label class="text-xs font-bold text-gray-400 uppercase tracking-wide">Email Address</label>
                    <input type="email" id="signin-email" required class="w-full mt-1.5 bg-brandBlue border border-gray-800 focus:border-brandYellow p-3.5 rounded-xl text-sm text-white focus:outline-none transition">
                </div>
                <div>
                    <label class="text-xs font-bold text-gray-400 uppercase tracking-wide">Security Password</label>
                    <input type="password" id="signin-password" required class="w-full mt-1.5 bg-brandBlue border border-gray-800 focus:border-brandYellow p-3.5 rounded-xl text-sm text-white focus:outline-none transition">
                </div>
                <button type="submit" class="w-full bg-gradient-to-r from-brandYellow to-yellow-500 text-brandBlue font-extrabold py-3.5 rounded-xl shadow-md transition transform active:scale-95 text-sm uppercase tracking-wider">
                    Sign In Account
                </button>
            </form>
            <div class="text-center text-xs">
                <span class="text-gray-400">Don't have an account?</span>
                <button onclick="switchAuthView('signup')" class="text-brandPink font-bold ml-1 hover:underline">Sign up</button>
            </div>
        </div>

        <div id="auth-signup" class="view-section w-full max-w-md bg-brandBlueCard border border-gray-800 rounded-3xl p-6 space-y-6 shadow-xl">
            <div class="text-center">
                <h2 class="text-2xl font-black tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-brandYellow to-brandPink">FORTUNE EARNERS</h2>
                <p class="text-xs text-gray-400 mt-1">Create your automated earning gateway</p>
            </div>
            <form id="signup-form" class="space-y-4">
                <div>
                    <label class="text-xs font-bold text-gray-400 uppercase tracking-wide">Full Name</label>
                    <input type="text" id="signup-fullname" required class="w-full mt-1.5 bg-brandBlue border border-gray-800 focus:border-brandYellow p-3.5 rounded-xl text-sm text-white focus:outline-none transition">
                </div>
                <div>
                    <label class="text-xs font-bold text-gray-400 uppercase tracking-wide">Username</label>
                    <input type="text" id="signup-username" required class="w-full mt-1.5 bg-brandBlue border border-gray-800 focus:border-brandYellow p-3.5 rounded-xl text-sm text-white focus:outline-none transition">
                </div>
                <div>
                    <label class="text-xs font-bold text-gray-400 uppercase tracking-wide">Email Address</label>
                    <input type="email" id="signup-email" required class="w-full mt-1.5 bg-brandBlue border border-gray-800 focus:border-brandYellow p-3.5 rounded-xl text-sm text-white focus:outline-none transition">
                </div>
                <div>
                    <label class="text-xs font-bold text-gray-400 uppercase tracking-wide">Security Password</label>
                    <input type="password" id="signup-password" required class="w-full mt-1.5 bg-brandBlue border border-gray-800 focus:border-brandYellow p-3.5 rounded-xl text-sm text-white focus:outline-none transition">
                </div>
                <div>
                    <label class="text-xs font-bold text-brandYellow uppercase tracking-wide">Referred By</label>
                    <input type="text" id="signup-ref" readonly class="w-full mt-1.5 bg-brandBlue/50 border border-gray-800 p-3.5 rounded-xl text-sm text-gray-400 font-bold focus:outline-none cursor-not-allowed">
                </div>
                <button type="submit" class="w-full bg-gradient-to-r from-brandPink to-pink-600 text-white font-extrabold py-3.5 rounded-xl shadow-md transition transform active:scale-95 text-sm uppercase tracking-wider">
                    Sign Up Now
                </button>
            </form>
            <div class="text-center text-xs">
                <span class="text-gray-400">Already have an account?</span>
                <button onclick="switchAuthView('signin')" class="text-brandYellow font-bold ml-1 hover:underline">Sign in</button>
            </div>
        </div>

    </div>

    <div id="app-container" class="hidden">
        
        <header class="sticky top-0 z-50 bg-brandBlue/90 backdrop-blur-md border-b border-gray-800 px-4 py-3 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <button id="hamburger-btn" class="text-gray-300 focus:outline-none text-xl p-1 hover:text-brandYellow transition">
                    <i class="fas fa-bars"></i>
                </button>
                <span class="font-extrabold text-lg tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-brandYellow to-brandPink">FORTUNE EARNERS</span>
            </div>
            <div class="flex items-center space-x-3">
                <div class="flex items-center bg-brandBlueCard border border-gray-750 px-2.5 py-1 rounded-full text-xs space-x-1.5">
                    <span class="text-sm">🇳🇬</span>
                    <span class="font-bold text-gray-300">NG</span>
                </div>
                <div id="avatar-fallback" class="w-8 h-8 rounded-full bg-brandPink/30 border border-brandPink flex items-center justify-center text-xs font-bold text-brandPink uppercase">
                    FE
                </div>
            </div>
        </header>

        <div id="sidebar" class="fixed inset-0 z-50 transform -translate-x-full transition-transform duration-300 ease-in-out flex">
            <div class="w-72 bg-brandBlueCard h-full p-5 shadow-2xl flex flex-col justify-between border-r border-gray-800">
                <div>
                    <div class="flex items-center justify-between pb-6 border-b border-gray-800">
                        <span class="font-bold text-lg text-brandYellow">Navigation Menu</span>
                        <button id="close-sidebar" class="text-gray-400 hover:text-brandPink text-lg"><i class="fas fa-times"></i></button>
                    </div>
                    <nav class="mt-6 space-y-1">
                        <button onclick="switchMainView('dashboard')" class="w-full text-left flex items-center space-x-3 p-3 rounded-xl hover:bg-brandBlue text-gray-300 hover:text-brandYellow transition"><i class="fas fa-tasks text-brandYellow w-5"></i><span>Daily Tasks</span></button>
                        <button onclick="switchMainView('dashboard')" class="w-full text-left flex items-center space-x-3 p-3 rounded-xl hover:bg-brandBlue text-gray-300 hover:text-brandYellow transition"><i class="fas fa-ad text-brandYellow w-5"></i><span>Sponsored Ads</span></button>
                        <button onclick="switchMainView('activate')" class="w-full text-left flex items-center space-x-3 p-3 rounded-xl hover:bg-brandBlue text-gray-300 hover:text-brandYellow transition"><i class="fas fa-gem text-brandYellow w-5"></i><span>Activate A Plan</span></button>
                        <button onclick="switchMainView('dashboard')" class="w-full text-left flex items-center space-x-3 p-3 rounded-xl hover:bg-brandBlue text-gray-300 hover:text-brandYellow transition"><i class="fas fa-wallet text-brandYellow w-5"></i><span>Wallet Balance</span></button>
                        <button onclick="switchMainView('referrals')" class="w-full text-left flex items-center space-x-3 p-3 rounded-xl hover:bg-brandBlue text-gray-300 hover:text-brandYellow transition"><i class="fas fa-users text-brandYellow w-5"></i><span>Referrals</span></button>
                        <button onclick="switchMainView('ads')" class="w-full text-left flex items-center space-x-3 p-3 rounded-xl hover:bg-brandBlue text-gray-300 hover:text-brandYellow transition"><i class="fas fa-bullhorn text-brandYellow w-5"></i><span>Place Ads</span></button>
                        <button onclick="alert('FORTUNE EARNERS: Premium task optimization and structural network ecosystem.')" class="w-full text-left flex items-center space-x-3 p-3 rounded-xl hover:bg-brandBlue text-gray-300 hover:text-brandYellow transition"><i class="fas fa-info-circle text-brandYellow w-5"></i><span>About FORTUNE EARNERS</span></button>
                        <a href="https://t.me/Dani_Tech01" target="_blank" class="flex items-center space-x-3 p-3 rounded-xl hover:bg-brandBlue text-gray-300 hover:text-brandYellow transition"><i class="fab fa-telegram text-brandYellow w-5"></i><span>Contact Support</span></a>
                    </nav>
                </div>
                <button onclick="triggerLogout()" class="w-full bg-red-600/20 hover:bg-red-600 border border-red-600/40 text-red-200 font-medium py-2.5 rounded-xl transition flex items-center justify-center space-x-2">
                    <i class="fas fa-sign-out-alt"></i><span>Log Out</span>
                </button>
            </div>
            <div id="sidebar-backdrop" class="flex-1 bg-black/60 backdrop-blur-sm"></div>
        </div>

        <main class="max-w-md mx-auto p-4 space-y-4">
            
            <div class="bg-brandBlueCard border border-brandPink/30 text-gray-300 p-3 rounded-2xl flex items-start space-x-3 text-xs shadow-sm">
                <i class="fas fa-bullhorn mt-0.5 text-brandPink animate-pulse
