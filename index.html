<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FORTUNE EARNERS</title>

<style>
body{
font-family:Arial;
margin:0;
background:#f3f3f3;
padding:20px;
}

.box{
background:white;
padding:20px;
border-radius:15px;
margin-bottom:15px;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border:1px solid #ccc;
border-radius:8px;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#1e3a8a;
color:white;
cursor:pointer;
}

#status{
margin-top:10px;
font-weight:bold;
}
</style>
</head>

<body> <div id="plansBox" class="box" style="display:none;"> <div id="tasksBox" class="box" style="display:none;">

<h3>Daily Tasks</h3>

<button onclick="completeTask()">
Perform Task
</button>

<button onclick="watchSponsoredAd()">
Watch Sponsored Ad
</button>

<p id="taskStatus"></p>

</div>

<h3>Activate Plan</h3>

<button onclick="activatePlan('NEWBIE',750,400)">
NEWBIE PLAN — ₦750
</button>

<button onclick="activatePlan('SILVER',1500,700)">
SILVER PLAN — ₦1,500
</button>

<button onclick="activatePlan('GOLD',3000,1050)">
GOLD PLAN — ₦3,000
</button>

<button onclick="activatePlan('DIAMOND',5000,2100)">
DIAMOND PLAN — ₦5,000
</button>

<button onclick="activatePlan('PREMIUM',7000,3300)">
PREMIUM PLAN — ₦7,000
</button>

</div>

<h2>F̋ŐR̋T̋ŰN̋E̋ E̋A̋R̋N̋E̋R̋S̋</h2>

<div id="authBox" class="box">

<h3>Sign Up</h3>
<input id="username" placeholder="Username">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="signup()">Create Account</button>

<hr>

<h3>Login</h3>
<input id="loginEmail" placeholder="Email">
<input id="loginPassword" type="password" placeholder="Password">
<button onclick="login()">Login</button>

<p id="status"></p>
</div>

<div id="userBox" class="box" style="display:none;">
<h3>Welcome</h3>
<p id="userInfo"></p>
<button onclick="logout()">Logout</button>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
firebase.initializeApp({
apiKey: "AIzaSyBv1SXWPb74YrhY-LDyFKZ8rMeTeXfYHHM",
authDomain: "my-main-pre-website.firebaseapp.com",
projectId: "my-main-pre-website",
storageBucket: "my-main-pre-website.appspot.com",
messagingSenderId: "700263761679",
appId: "1:700263761679:web:f5eb1dec9e63a52465e07a"
});

const auth = firebase.auth();
const db = firebase.firestore();

/* AUTH STATE */
auth.onAuthStateChanged(async user=>{
if(user){document.getElementById("tasksBox").style.display="block";
document.getElementById("plansBox").style.display="block";
let doc = await db.collection("users").doc(user.uid).get();
let data = doc.data();

document.getElementById("authBox").style.display="none";
document.getElementById("userBox").style.display="block";

document.getElementById("userInfo").innerHTML =
"Username: " + data.username + "<br>Email: " + data.email;

}else{document.getElementById("plansBox").style.display="none";
document.getElementById("authBox").style.display="block";
document.getElementById("userBox").style.display="none";
}
});

/* SIGNUP */
function signup(){
let username=document.getElementById("username").value;
let email=document.getElementById("email").value;
let password=document.getElementById("password").value;

let status=document.getElementById("status");

// 👉 capture referral from URL
const urlParams = new URLSearchParams(window.location.search);
const ref = urlParams.get("ref");

auth.createUserWithEmailAndPassword(email,password)
.then(res=>{
return db.collection("users").doc(res.user.uid).set({
username: username,
email: email,

balance: 0,
taskWallet: 0,
affiliateWallet: 0,

plan: "none",

referralCode: username,
referredBy: ref || null,   // ✅ NEW LINE

createdAt: new Date()
});
})
.then(()=>{
status.style.color="green";
status.innerText="Account created successfully ✔";
})
.catch(err=>{
status.style.color="red";
status.innerText=err.message;
});
}

/* LOGIN */
function login(){
let email=document.getElementById("loginEmail").value;
let password=document.getElementById("loginPassword").value;

auth.signInWithEmailAndPassword(email,password)
.catch(err=>{
document.getElementById("status").innerText=err.message;
});
}

/* LOGOUT */
function logout(){async function activatePlan(planName,planAmount,refBonus){

const user = auth.currentUser;

if(!user){
alert("Login first");
return;
}

const userRef = db.collection("users").doc(user.uid);

const doc = await userRef.get();
const data = doc.data();

/* update current user's plan */
await userRef.update({
plan: planName
});

/* referral reward */
if(data.referredBy){

const query = await db.collection("users")
.where("username","==",data.referredBy)
.get();

if(!query.empty){

const referrerDoc = query.docs[0];

const referrerData = referrerDoc.data();

let currentAffiliate =
referrerData.affiliateWallet || 0;

await referrerDoc.ref.update({
affiliateWallet:
currentAffiliate + refBonus
});

}

}

alert(planName + " activated successfully ✔");

}
auth.signOut();
}
</script>

</body>
</html>
